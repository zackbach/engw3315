<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <style>
    /* Reset */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 1.125rem;
      line-height: 1.8;
      color: #2c2c2c;
      background: #fafaf8;
      padding: 2rem 1.5rem;
    }

    .container {
      max-width: 42rem;
      margin: 0 auto;
    }

    /* Title block */
    .title-block {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .title-block h1 {
      font-size: 2.75rem;
      line-height: 1.2;
      margin-bottom: 0.4rem;
      color: #1a1a1a;
    }

    .title-block .byline {
      font-size: 1.1rem;
      color: #666;
      margin: 0.2rem 0;
    }

    /* Subheadings */
    h2 {
      font-size: 1.75rem;
      margin-top: 2.5rem;
      margin-bottom: 0.75rem;
      color: #1a1a1a;
    }

    h3 {
      font-size: 1.35rem;
      margin-top: 2rem;
      margin-bottom: 0.5rem;
      color: #333;
    }

    p {
      margin-bottom: 1.25rem;
      text-align: justify;
      hyphens: auto;
      -webkit-hyphenate-limit-before: 4;
      -webkit-hyphenate-limit-after: 4;
      hyphenate-limit-chars: 10 4 4;
      hyphenate-limit-lines: 2;
    }

    ol, ul {
      margin: 0 0 1.25rem 0;
      padding-left: 2rem;
    }

    ol { list-style: decimal outside; }
    ul { list-style: disc outside; }

    li {
      margin-bottom: 0.4rem;
    }

    li > ol, li > ul {
      margin-top: 0.4rem;
      margin-bottom: 0.4rem;
    }

    .title-block p {
      text-align: center;
      hyphens: none;
    }

    /* Highlighted text */
    mark {
      background: #fff3a8;
      padding: 0.1em 0.25em;
      border-radius: 2px;
      color: inherit;
    }
    mark.green  { background: #bfedd2; }
    mark.orange { background: #ffb46f; }
    mark.yellow { background: #fbeeb8; }
    mark.purple { background: #eccafa; }

    /* Images and embeds */
    img {
      max-width: 100%;
      height: auto;
      border-radius: 4px;
      margin: 0.5rem 0;
    }

    img + img, p:has(img) + p > img {
      margin-top: 0.25rem;
    }

    .img-small {
      max-width: 65%;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }

    iframe, embed, video {
      max-width: 100%;
      margin: 1.5rem 0;
    }

    /* Horizontal rule */
    hr {
      border: none;
      border-top: 1px solid #ddd;
      margin: 2.5rem 0;
    }

    /* Links */
    a {
      color: #4a6fa5;
      text-decoration: underline;
      text-decoration-thickness: 1px;
      text-underline-offset: 2px;
    }

    a:hover {
      color: #2c4a7c;
    }

    /* Blockquotes */
    blockquote {
      border-left: 3px solid #ccc;
      padding-left: 1.25rem;
      margin: 1.5rem 0;
      color: #555;
      font-style: italic;
    }
    /* Canvas-style post */
    .canvas-post {
      border: 1px solid #dfe3e8;
      border-radius: 6px;
      padding: 1rem 1.25rem;
      margin: 1.5rem 0;
      background: #fff;
      font-family: "Lato", "Helvetica Neue", Arial, sans-serif;
      font-size: 0.95rem;
      line-height: 1.5;
      color: #2d3b45;
    }

    .canvas-post__header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.75rem;
    }

    .canvas-post__avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      flex-shrink: 0;
      background: #394b58;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 600;
      font-size: 0.9rem;
      overflow: hidden;
    }

    .canvas-post__avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      margin: 0;
      border-radius: 0;
      max-width: none;
    }

    .canvas-post__meta {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .canvas-post__name {
      font-weight: 700;
      color: #2d3b45;
    }

    .canvas-post__time {
      font-size: 0.8rem;
      color: #6b7780;
    }

    .canvas-post__body p {
      text-align: left;
      hyphens: none;
      margin-bottom: 0.75rem;
      font-family: inherit;
      font-size: inherit;
      line-height: inherit;
    }

    .canvas-post__body p:last-child {
      margin-bottom: 0;
    }

    .chart-caption {
      text-align: center;
      font-size: 0.85rem;
      color: #666;
      font-style: italic;
      margin: 0.75rem auto 1.5rem;
      max-width: 90%;
      hyphens: none;
    }

    /* Chart */
    .chart-toggle {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 0.95rem;
      padding: 0.4rem 1rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #fff;
      color: #2c2c2c;
      cursor: pointer;
    }

    .chart-toggle:hover {
      background: #f0f0ee;
    }

    .chart-toggle.active {
      background: #2c2c2c;
      color: #fafaf8;
      border-color: #2c2c2c;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.8/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="container">
    <div class="title-block">
      <h1>{{ page.title }}</h1>
      {% if page.author %}<p class="byline">{{ page.author }}</p>{% endif %}
      {% if page.class %}<p class="byline">{{ page.class }}</p>{% endif %}
    </div>
    {{ content }}
  </div>
</body>
</html>
